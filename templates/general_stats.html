{% extends "base.html" %}
{% block title %}BitTracer — General Stats{% endblock %}

{% block content %}
<div class="p-4 max-w-7xl mx-auto min-h-screen
     bg-gradient-to-br from-zinc-50 via-neutral-50 to-orange-50
     dark:from-zinc-900/50 dark:via-neutral-900/50 dark:to-orange-900/50">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold bg-clip-text text-transparent
               bg-gradient-to-r from-orange-500 via-amber-400 to-yellow-500">
      General Blockchain Stats
    </h1>
    <a href="/" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">
      ← Home
    </a>
  </div>

  <!-- Chain filter -->
  <div class="flex gap-3 mb-6 flex-wrap">
    <select id="chain-filter" onchange="renderChainDetails()"
      class="border rounded-lg px-3 py-2 dark:bg-gray-800 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-orange-400">
      <option value="all">All Chains</option>
      {% for chain in chains %}
      <option value="{{ chain.value }}">{{ chain.label }}</option>
      {% endfor %}
    </select>
    <button onclick="fetchStats()"
      class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">
      🔄 Refresh
    </button>
  </div>

  <!-- Spinner -->
  <div id="gs-spinner" class="flex justify-center items-center py-20">
    <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Error -->
  <div id="gs-error" class="hidden text-center text-red-500 py-10"></div>

  <!-- Summary stat cards -->
  <div id="summary-cards" class="hidden grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-8"></div>

  <!-- Chain detail grid -->
  <div id="chain-detail" class="hidden"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/general_stats.js') }}"></script>
{% endblock %}
